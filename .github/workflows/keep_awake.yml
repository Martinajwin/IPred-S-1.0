name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Ping with Real Browser
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print('Opening Streamlit app...')
              page.goto('https://aip-s-1-single-stage-screening.streamlit.app/')
              page.wait_for_timeout(10000) # Wait 10 seconds for WebSocket to connect
              print('Ping successful. Closing browser.')
              browser.close()
          "
